name: Deploy Infocaudales Bot to VPS

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Install Puppeteer Browsers
        run: npx puppeteer browsers install chrome

      - name: Run Tests
        env:
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH & Reload PM2
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            echo "🚀 Starting Infocaudales deployment..."
            
            # Navigate to project directory (update path if different on VPS)
            cd /home/Projects/infocaudales
            
            # Fetch latest changes and reset working directory
            git fetch origin master
            git reset --hard origin/master
            
            # Install production dependencies and compile TypeScript
            npm ci
            npm run build
            
            # Start or reload PM2 process using ecosystem config
            pm2 startOrReload ecosystem.config.js --env production || pm2 restart ecosystem.config.js --env production
            pm2 save
            
            echo "✅ Infocaudales Bot successfully deployed & PM2 reloaded on $(date)"
